#!/bin/sh
# =============================================
# Terminal Switcher
# Change TERMINAL to switch: ghostty | kitty
# All scripts source this file for consistency.
# =============================================
TERMINAL=kitty

case "$TERMINAL" in
  ghostty)
    TERMINAL_APP="Ghostty"
    TERMINAL_BIN="/Applications/Ghostty.app/Contents/MacOS/ghostty"
    TERMINAL_CONFIG="$HOME/.config/ghostty/config"
    ;;
  kitty)
    TERMINAL_APP="kitty"
    TERMINAL_BIN="/Applications/kitty.app/Contents/MacOS/kitty"
    TERMINAL_CONFIG="$HOME/.config/kitty/kitty.conf"
    ;;
esac
